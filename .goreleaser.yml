version: 2

project_name: helmcov

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: helmcov
    main: ./cmd/helmcov
    binary: helmcov
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: helmcov
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

dockers:
  - ids: [helmcov]
    dockerfile: Dockerfile.release
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/helmcov:v{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/helmcov:latest"
