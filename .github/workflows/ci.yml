name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run Make CI target
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make ci
      - name: Detect code changes for commit convention checks
        id: changed
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile*'
              - '.github/workflows/*.yml'
      - name: Validate conventional commit messages
        if: github.event_name == 'pull_request' && steps.changed.outputs.code == 'true'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=200
          invalid=0
          while IFS= read -r subject; do
            if [[ "$subject" =~ ^Merge ]]; then
              continue
            fi
            if [[ "$subject" =~ ^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([a-zA-Z0-9._/-]+\))?(!)?:\ .+ ]]; then
              continue
            fi
            echo "Non-conventional commit subject: $subject"
            invalid=1
          done < <(git log --format=%s "origin/${{ github.base_ref }}..HEAD")
          if [ "$invalid" -ne 0 ]; then
            echo "Conventional commits are required for code changes."
            exit 1
          fi
